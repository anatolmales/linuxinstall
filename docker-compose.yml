version: '3.8'

services:

  wgeasy:
    image: ghcr.io/wg-easy/wg-easy
    container_name: wgeasy
    networks:
      - proxy
    environment:
      # Хеш пароля интерфейса
      - PASSWORD_HASH=$$2y$$10$$hBCoykrB95WSzuV4fafBzOHWKu9sbyVa34GJr8VV5R/pIelfEMYyG
      # Порт веб-интерфейса
      - PORT=51821
      # Порт WireGuard
      - WG_PORT=51820
      # Домен/внешний IP
      - WG_HOST=IPADDRESS
      # Локализация UI
      - LANG=ru
      # Keepalive для пиринга
      - WG_PERSISTENT_KEEPALIVE=10
      # IP клиента
      - WG_DEFAULT_ADDRESS=10.8.0.x
      # Маска подсети
      - WG_DEFAULT_ADDRESS_RANGE=24
      # DNS для клиентов
      - WG_DEFAULT_DNS=1.1.1.1
      # Разрешённый трафик
      - WG_ALLOWED_IPS=0.0.0.0/0
      # MTU WireGuard
      - WG_MTU=1420
      # Включить статистику трафика
      - UI_TRAFFIC_STATS=true
    volumes:
      - ./wireguard:/etc/wireguard  # Конфиги WireGuard
    ports:
      - "51820:51820/udp"            # UDP WireGuard порт
    restart: unless-stopped
    cap_add:
      - NET_ADMIN                   # Разрешение сетевого управления
      - SYS_MODULE                  # Работа с модулями ядра
    sysctls:
      - net.ipv4.ip_forward=1       # Разрешить маршрутизацию
      - net.ipv4.conf.all.src_valid_mark=1 # Для policy routing
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wgeasy.rule=Host(`IPADDRESS`)"         # Домен WG Easy
      - "traefik.http.routers.wgeasy.entrypoints=websecure"          # HTTPS вход
      - "traefik.http.routers.wgeasy.tls=true"                       # Включить TLS
      - "traefik.http.routers.wgeasy.tls.certresolver=myresolver"    # ACME Let's Encrypt
      - "traefik.http.services.wgeasy.loadbalancer.server.port=51821" # Внутренний порт UI

  xui:
    image: alireza7/x-ui:latest
    container_name: xui
    hostname: IPADDRESS              # Хостнейм панели
    volumes:
      - ./x-ui/:/etc/x-ui/           # Конфиги X-UI
      - ./letsencrypt:/letsencrypt   # Сертификаты LE
      - /etc/localtime:/etc/localtime:ro # Локальное время
    environment:
      TZ: Asia/Novosibirsk           # Часовой пояс
      XRAY_VMESS_AEAD_FORCED: false  # Отключить AEAD Vmess
    tty: true
    network_mode: host               # Использовать хост-сеть
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.xui.rule=Host(`IPADDRESS`) && PathPrefix(`/`)"  # Роутер X-UI
      - "traefik.http.routers.xui.entrypoints=websecure"                       # HTTPS вход
      - "traefik.http.routers.xui.tls=true"
      - "traefik.http.routers.xui.tls.certresolver=myresolver"
      - "traefik.http.services.xui.loadbalancer.server.port=54321"             # Порт панели

  traefik:
    image: traefik:latest
    container_name: traefik
    networks:
      - proxy
    command:
      - --log.level=INFO                       # Уровень логов
      - --api.dashboard=true                   # Включить панель
      - --api.insecure=false                   # Отключить HTTP API
      - --providers.docker=true                # Конфиги из Docker
      - --providers.docker.exposedbydefault=false # Не публиковать по умолчанию
      - --providers.docker.network=proxy       # Использовать сеть proxy
      - --entrypoints.web.address=:80          # HTTP вход
      - --entrypoints.websecure.address=:443   # HTTPS вход
      - --entrypoints.web.http.redirections.entrypoint.to=websecure   # Авто-редирект
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --certificatesresolvers.myresolver.acme.tlschallenge=true     # TLS challenge
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json # Хранение ACME
      - --certificatesresolvers.myresolver.acme.email=admin@IPADDRESS # Почта ACME
    ports:
      - "80:80"                                  # HTTP внешний
      # - "443:443"                              # HTTPS через host network, если нужно
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro         # Время системы
      - /var/run/docker.sock:/var/run/docker.sock:ro # Доступ к Docker
      - ./letsencrypt:/letsencrypt               # Сертификаты
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`IPADDRESS`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"  # Доступ к панели
      - "traefik.http.routers.api.service=api@internal"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=myresolver"
      - "traefik.http.routers.api.middlewares=auth"                       # Базовая авторизация
      - "traefik.http.middlewares.auth.basicauth.users=admin:$$2y$$10$$hBCoykrB95WSzuV4fafBzOHWKu9sbyVa34GJr8VV5R/pIelfEMYyG"

  whoami:
    image: traefik/whoami
    container_name: whoami
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`IPADDRESS`) && PathPrefix(`/whoami`)" # Тестовый сервис
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls=true"
      - "traefik.http.routers.whoami.tls.certresolver=myresolver"

networks:
  proxy:
    name: proxy
    external: true  # Использовать существующую сеть
